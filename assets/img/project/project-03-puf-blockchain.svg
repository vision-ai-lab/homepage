    <text x="20" y="373" class="small" font-size="16">Security against cloning and attacks</text>
  </g>
  <path class="line" d="M285 278C325 278 342 254 372 250"/>
  <path class="line" d="M616 275C650 275 660 256 690 252"/>
  <g opacity=".65">
    <path class="thin" d="M52 475H908"/><path class="thin" d="M52 528H908"/>
    <text x="70" y="510" class="small" font-size="22">Device authentication</text>
    <text x="330" y="510" class="small" font-size="22">Integrity audit</text>
    <text x="575" y="510" class="small" font-size="22">Tamper detection</text>
    <text x="792" y="510" class="small" font-size="22">Secure deployment</text>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 620" role="img" aria-label="PUF Blockchain Security project visual placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#061426"/>
      <stop offset="100%" stop-color="#0d2b48"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ef6e0"/>
      <stop offset="100%" stop-color="#2f7df6"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7d980"/>
      <stop offset="100%" stop-color="#d59c3c"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .label{font-family:Inter,Arial,sans-serif;font-weight:800;fill:#fff}
      .small{font-family:Inter,Arial,sans-serif;font-weight:700;fill:#b9cadc}
      .line{stroke:#43d8ff;stroke-width:4;stroke-linecap:round;opacity:.85}
      .thin{stroke:#94a9c2;stroke-width:2;opacity:.45}
    </style>
  </defs>
  <rect x="10" y="10" width="940" height="600" rx="34" fill="url(#bg)" stroke="#34506d" stroke-width="3"/>
  <text x="50" y="76" class="label" font-size="42">PUF-Blockchain Security</text>
  <text x="52" y="116" class="small" font-size="22">Tamper-resistant device identity · distributed integrity verification</text>
  <g transform="translate(70 170)">
    <rect x="0" y="0" width="210" height="220" rx="24" fill="#10233a" stroke="#2f6287" stroke-width="3"/>
    <rect x="44" y="54" width="122" height="96" rx="16" fill="#08182a" stroke="url(#cyan)" stroke-width="4"/>
    <g stroke="#2ddce4" stroke-width="3" opacity=".9">
      <line x1="66" y1="45" x2="66" y2="20"/><line x1="92" y1="45" x2="92" y2="20"/><line x1="118" y1="45" x2="118" y2="20"/><line x1="144" y1="45" x2="144" y2="20"/>
      <line x1="66" y1="184" x2="66" y2="158"/><line x1="92" y1="184" x2="92" y2="158"/><line x1="118" y1="184" x2="118" y2="158"/><line x1="144" y1="184" x2="144" y2="158"/>
      <line x1="34" y1="76" x2="8" y2="76"/><line x1="34" y1="102" x2="8" y2="102"/><line x1="34" y1="128" x2="8" y2="128"/>
      <line x1="202" y1="76" x2="176" y2="76"/><line x1="202" y1="102" x2="176" y2="102"/><line x1="202" y1="128" x2="176" y2="128"/>
    </g>
    <circle cx="105" cy="102" r="34" fill="none" stroke="#4ef6e0" stroke-width="5" filter="url(#glow)"/>
    <path d="M82 103h46M106 80v46" stroke="#4ef6e0" stroke-width="5" stroke-linecap="round"/>
    <text x="65" y="194" class="label" font-size="28">PUF</text>
    <text x="34" y="222" class="small" font-size="16">Unique hardware fingerprint</text>
  </g>
  <g transform="translate(380 185)">
    <circle cx="94" cy="66" r="42" fill="#10233a" stroke="url(#gold)" stroke-width="4"/>
    <circle cx="220" cy="66" r="42" fill="#10233a" stroke="url(#cyan)" stroke-width="4"/>
    <circle cx="157" cy="166" r="42" fill="#10233a" stroke="#8e7dff" stroke-width="4"/>
    <path class="line" d="M135 66h44M115 103l22 28M199 103l-22 28"/>
    <text x="55" y="260" class="label" font-size="28">Blockchain</text>
    <text x="22" y="287" class="small" font-size="16">Immutable verification ledger</text>
    <g class="small" font-size="19" text-anchor="middle">
      <text x="94" y="73">ID</text><text x="220" y="73">LOG</text><text x="157" y="173">HASH</text>
    </g>
  </g>
  <g transform="translate(680 162)">
    <path d="M110 0l94 36v91c0 90-54 147-94 169-40-22-94-79-94-169V36L110 0z" fill="#10233a" stroke="url(#cyan)" stroke-width="5" filter="url(#glow)"/>
    <path d="M66 142l31 32 62-74" fill="none" stroke="#66f7c9" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
